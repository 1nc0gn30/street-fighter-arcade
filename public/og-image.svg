<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Street Fighter Arcade OG image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#17172b"/>
      <stop offset="100%" stop-color="#250909"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff3d00"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="rgba(255,255,255,0.03)"/>
      <rect y="3" width="6" height="3" fill="rgba(0,0,0,0.03)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#scan)"/>

  <g opacity="0.25">
    <circle cx="170" cy="92" r="230" fill="#f3a712"/>
    <circle cx="1080" cy="560" r="260" fill="#a30000"/>
  </g>

  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#neon)" stroke-width="6"/>
  <rect x="68" y="68" width="1064" height="494" rx="14" fill="rgba(0,0,0,0.35)" stroke="#ffffff" stroke-opacity="0.15"/>

  <text x="86" y="178" font-size="120" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" fill="#ffcc00" filter="url(#glow)">STREET FIGHTER</text>
  <text x="88" y="252" font-size="72" font-family="Verdana, Geneva, sans-serif" letter-spacing="6" fill="#e9ecff">ARCADE</text>

  <g transform="translate(86, 300)">
    <rect x="0" y="0" width="560" height="170" rx="14" fill="#09090f" stroke="#ff3d00" stroke-width="3"/>
    <text x="26" y="58" font-size="28" font-family="Verdana, Geneva, sans-serif" fill="#ffcc00">CODE. TYPE. FIGHT.</text>
    <text x="26" y="102" font-size="24" font-family="Verdana, Geneva, sans-serif" fill="#d7d7ef">Multiplayer retro battles at</text>
    <text x="26" y="142" font-size="28" font-family="Verdana, Geneva, sans-serif" fill="#ffffff">arcade.nealfrazier.tech</text>
  </g>

  <g transform="translate(760, 296)">
    <rect x="0" y="0" width="350" height="190" rx="16" fill="#08080d" stroke="#ffcc00" stroke-width="3"/>
    <circle cx="72" cy="66" r="18" fill="#ff3d00"/>
    <circle cx="130" cy="66" r="18" fill="#ffcc00"/>
    <circle cx="188" cy="66" r="18" fill="#00c2ff"/>
    <rect x="40" y="120" width="270" height="24" rx="12" fill="#1f1f2f"/>
    <rect x="40" y="120" width="178" height="24" rx="12" fill="url(#neon)"/>
    <text x="40" y="170" font-size="20" font-family="Verdana, Geneva, sans-serif" fill="#f4f4f9">INSERT COIN</text>
  </g>

  <text x="86" y="560" font-size="26" font-family="Verdana, Geneva, sans-serif" fill="#ffffff" fill-opacity="0.85">nealfrazier.tech • built with Vite + React + Supabase</text>
</svg>
